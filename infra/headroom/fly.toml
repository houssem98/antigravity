# Headroom compression proxy — sits in front of LLM providers.
# gravity-api routes LLM calls through this to cut input tokens ~90%.
app = "headroom-proxy"
primary_region = "iad"

[build]
  image = "ghcr.io/chopratejas/headroom:latest"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024"
