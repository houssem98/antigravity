name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── Python / gravity-api ────────────────────────────────────────────────
  api-lint:
    name: API — Lint & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/gravity-api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pyright

      - name: Ruff lint
        run: ruff check app/

      - name: Ruff format check
        run: ruff format --check app/

      - name: Pyright type-check
        run: pyright app/
        continue-on-error: true  # type errors are advisory until stubs are complete

  api-test:
    name: API — Unit + integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/gravity-api

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov httpx

      - name: Run tests
        env:
          REDIS_URL: redis://localhost:6379
          # All vector/DB dependencies absent → code paths fall back gracefully
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: services/gravity-api/coverage.xml
          flags: gravity-api
        continue-on-error: true

  # ── Frontend / gravity-ui ───────────────────────────────────────────────
  ui-lint:
    name: UI — Lint & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/gravity-ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspace=apps/gravity-ui

      - name: ESLint
        run: npm run lint --workspace=apps/gravity-ui

      - name: TypeScript check
        run: npm run typecheck --workspace=apps/gravity-ui

  ui-build:
    name: UI — Next.js build
    runs-on: ubuntu-latest
    needs: ui-lint
    defaults:
      run:
        working-directory: apps/gravity-ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspace=apps/gravity-ui

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build --workspace=apps/gravity-ui

  # ── Market UI — typecheck + deep-research eval gate ────────────────────
  market-ui:
    name: Market UI — typecheck & eval gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspace=apps/market-ui --include-workspace-root

      - name: TypeScript check
        working-directory: apps/market-ui
        run: npx tsc -b

      - name: Deep-research + grid eval suite
        working-directory: apps/market-ui
        run: |
          npx esbuild src/services/deepResearchService.phase2.test.ts \
            --bundle \
            --platform=node \
            --format=esm \
            --define:import.meta.env='{}' \
            --outfile=/tmp/phase2.mjs
          node /tmp/phase2.mjs

  # ── Evaluation gate (runs on main only) ────────────────────────────────
  eval-gate:
    name: Evaluation gate
    runs-on: ubuntu-latest
    needs: [api-test, ui-build]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install eval dependencies
        run: pip install httpx

      - name: Start gravity-api (mock mode)
        run: |
          cd services/gravity-api
          pip install -r requirements.txt
          # Start with all external services disabled — uses stub responses
          MOCK_EXTERNAL_SERVICES=1 uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 8
          curl -sf http://localhost:8000/health || (echo "API failed to start" && exit 1)
        continue-on-error: true  # eval runs as advisory until prod data available

      - name: Run evaluation suite
        run: |
          python eval/run_eval.py \
            --api-url http://localhost:8000 \
            --output eval/results/ci_${{ github.sha }}.json \
            --concurrency 2
        continue-on-error: true  # advisory — no external data in CI

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-${{ github.sha }}
          path: eval/results/

  # ── Docker image build ──────────────────────────────────────────────────
  docker-build:
    name: Docker — build & push (main only)
    runs-on: ubuntu-latest
    needs: [api-test, ui-build]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push gravity-api
        uses: docker/build-push-action@v5
        with:
          context: services/gravity-api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/gravity-api:latest
            ghcr.io/${{ github.repository }}/gravity-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push gravity-ui
        uses: docker/build-push-action@v5
        with:
          context: apps/gravity-ui
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:8000' }}
          tags: |
            ghcr.io/${{ github.repository }}/gravity-ui:latest
            ghcr.io/${{ github.repository }}/gravity-ui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
