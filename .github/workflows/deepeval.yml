name: deepeval RAG Quality

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: Gravity API URL
        required: false
        default: http://localhost:8000
      limit:
        description: Max queries to evaluate
        required: false
        default: "20"
  schedule:
    - cron: "0 2 * * 0"  # Weekly Sunday 2am UTC

jobs:
  deepeval:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/gravity-api/requirements.txt

      - name: Install dependencies
        run: |
          cd services/gravity-api
          pip install -q -r requirements.txt

      - name: Run deepeval (manual/scheduled)
        if: github.event_name != 'pull_request'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd services/gravity-api
          GRAVITY_API_URL="${{ github.event.inputs.api_url || 'http://localhost:8000' }}" \
          python tests/eval/run_deepeval.py \
            --limit ${{ github.event.inputs.limit || '20' }} \
            --output /tmp/deepeval_results.json
        continue-on-error: true

      - name: Company-correctness gate (no cross-company answers)
        if: github.event_name != 'pull_request'
        run: |
          cd services/gravity-api
          GRAVITY_API_URL="${{ github.event.inputs.api_url || 'http://localhost:8000' }}" \
          python tests/eval/company_correctness.py \
            --limit ${{ github.event.inputs.limit || '50' }} \
            --threshold 0.95 \
            --output /tmp/company_correctness.json
        # NOT continue-on-error: a wrong-company answer (cross-company drift /
        # cache poisoning) must fail the run — this is the credibility gate.

      - name: FailSafe robustness (refuse, don't hallucinate)
        if: github.event_name != 'pull_request'
        run: |
          cd services/gravity-api
          GRAVITY_API_URL="${{ github.event.inputs.api_url || 'http://localhost:8000' }}" \
          python tests/eval/failsafe.py --threshold 0.75 --output /tmp/failsafe.json
        continue-on-error: true   # trust signal; report (don't block) until tuned up

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deepeval-results
          path: |
            /tmp/deepeval_results.json
            /tmp/company_correctness.json
            /tmp/failsafe.json
          if-no-files-found: ignore

      - name: Comment PR (if available)
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const results = JSON.parse(fs.readFileSync('/tmp/deepeval_results.json', 'utf8'));
              const passRate = (results.pass_rate * 100).toFixed(1);
              const comment = `## deepeval RAG Results\n\n` +
                `✅ Pass rate: ${passRate}%\n\n` +
                Object.entries(results.metric_averages)
                  .map(([metric, score]) => `- ${metric}: ${score.toFixed(3)}`)
                  .join('\n');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (e) {
              console.log('No deepeval results to comment');
            }
