# fly.toml — Gravity API on Fly.io
# Deploy: cd services/gravity-api && fly launch --copy-config --no-deploy && fly deploy
app = "gravity-api-prod"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  LOG_LEVEL = "INFO"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 2                      # 4GB requires >=2 shared CPUs on Fly
  memory_mb = 4096              # 4GB: large 10-K/10-Q (40MB+ HTML) parse + chunk + embed during bulk ingest OOMs 2GB
