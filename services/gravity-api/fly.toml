# fly.toml — Gravity API on Fly.io
# Deploy: cd services/gravity-api && fly launch --copy-config --no-deploy && fly deploy
app = "gravity-api-prod"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  LOG_LEVEL = "INFO"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0      # bump to 1 for prod (cold start ~5s)
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024              # bump to 2048 if loading transformers / FinBERT
